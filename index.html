<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大富翁抽籤系統 - 貓貓貓版</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --center-bg: rgba(255, 255, 255, 0.1);
            --border-color: #111;
            --monopoly-red: #e63946;
            --monopoly-blue: #0072bb;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background: #000;
        }

        /* 1. 背景影片佔滿全螢幕並保持覆蓋 */
        .video-background {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .video-background iframe {
            position: absolute;
            top: 50%; left: 50%;
            width: 100vw;
            height: 56.25vw; /* 16:9 比例 */
            min-height: 100vh;
            min-width: 177.77vh; /* 確保在窄螢幕也能覆蓋 */
            transform: translate(-50%, -50%);
        }

        #board-container {
            width: 90vw;
            height: 85vh; 
            max-width: 1100px;
            max-height: 800px;
            display: grid;
            gap: 2px;
            background: transparent !important; 
            border: 4px solid var(--border-color);
            position: relative;
            z-index: 1;
        }

        .cell {
            background: rgba(255, 255, 255, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            outline: 1px solid var(--border-color);
            transition: transform 0.2s;
        }

        .cell.chance { background: rgba(255, 235, 204, 0.9); }
        .cell.fate { background: rgba(255, 210, 210, 0.9); }

        #center-area { 
            grid-column: 2 / -2;
            grid-row: 2 / -2;
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            margin: 5px;
            border: 2px solid var(--border-color);
            background: var(--center-bg); 
            backdrop-filter: blur(2px); 
        }

        .logo-text { 
            background: var(--monopoly-red); color: #fff; 
            padding: 8px 20px; font-size: clamp(18px, 4vmin, 32px);
            transform: rotate(-2deg); border: 3px solid #000; 
            box-shadow: 4px 4px 0px #000; margin-bottom: 15px; 
        }

        #status-text { 
            background: rgba(255,255,255,0.7); 
            padding: 5px 15px; border-radius: 20px;
            font-weight: bold; margin-bottom: 10px;
        }

        .cat-avatar { width: 3.5vmin; height: 3.5vmin; min-width: 25px; border-radius: 50%; margin-bottom: 5px; object-fit: cover; }
        .cell-text { font-size: clamp(10px, 1.8vmin, 20px); text-align: center; }
        
        .cell.active { 
            border: 4px solid var(--monopoly-red); 
            background: #fff !important; 
            z-index: 10; 
            outline: none; 
            transform: scale(1.05); 
        }

        .dice-container { display: flex; gap: 8px; margin-bottom: 8px; }
        .dice { width: 45px; height: 45px; background: white; border: 2px solid #000; display: flex; justify-content: center; align-items: center; font-size: 24px; border-radius: 6px; box-shadow: 2px 2px 0px #000; }
        
        button { cursor: pointer; padding: 10px 20px; font-weight: bold; border: 2px solid #000; box-shadow: 2px 2px 0px #000; border-radius: 5px; transition: 0.1s; }
        button:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px #000; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #fff; padding: 20px; border-radius: 10px; width: 90%; max-width: 600px; border: 4px solid #000; overflow-y: auto; max-height: 90vh; }
        #result-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 2000; justify-content: center; align-items: center; }
        .result-box { background: #fff; padding: 30px; border: 5px solid #000; text-align: center; box-shadow: 10px 10px 0px #000; min-width: 300px; }
        
        .setting-group { margin-bottom: 15px; }
        .setting-group label { display: block; font-weight: bold; margin-bottom: 5px; }
        .setting-group textarea { width: 100%; padding: 8px; border: 2px solid #000; box-sizing: border-box; font-family: inherit; }
    </style>
</head>
<body>

<audio id="bgm" src="sounds/bgm.mp3" loop></audio>
<audio id="sfx"></audio>

<div class="video-background">
    <div id="player"></div>
</div>

<div id="settings-modal" class="modal-overlay">
    <div class="modal-content">
        <h3>⚙️ 系統設定</h3>
        <div class="setting-group">
            <label>名單設定 (每行一個名字)</label>
            <textarea id="input-students" rows="5"></textarea>
        </div>
        <div class="setting-group">
            <label>機會清單 (每行一項)</label>
            <textarea id="input-chance" rows="3"></textarea>
        </div>
        <div class="setting-group">
            <label>命運清單 (每行一項)</label>
            <textarea id="input-fate" rows="3"></textarea>
        </div>
        <div style="text-align:right;">
            <button onclick="applySettings()" style="background:var(--monopoly-blue); color:#fff;">儲存設定</button>
            <button onclick="toggleModal(false)">關閉</button>
        </div>
    </div>
</div>

<div id="result-modal">
    <div class="result-box">
        <h2 id="result-title"></h2>
        <div id="result-display" style="margin: 20px 0;"></div>
        <button onclick="closeResult()" style="background:var(--monopoly-red); color:#fff;">確定</button>
    </div>
</div>

<div id="board-container">
    <div id="center-area">
        <div class="logo-text">大富翁抽籤系統 - 貓貓貓版</div>
        <div id="status-text">準備好了嗎？</div>
        <div class="dice-container">
            <div class="dice" id="dice1">?</div>
            <div class="dice" id="dice2">?</div>
        </div>
        <div style="display:flex; gap:10px;">
            <button onclick="rollDice()" style="background:var(--monopoly-red); color:#fff;">🎲 擲骰子</button>
            <button onclick="startMarquee()" style="background:#ffb703;">⚡ 快速抽籤</button>
        </div>
        <button onclick="toggleModal(true)" style="margin-top:10px; font-size:12px; background:#eee;">⚙️ 設定</button>
    </div>
</div>

<script>
    // --- 音效控制 ---
    const bgm = document.getElementById('bgm');
    const sfx = document.getElementById('sfx');
    const sfxList = ['blow', 'click', 'fate', 'roll', 'spin', 'step', 'wim'];
    let musicStarted = false;
    bgm.volume = 0.2; 

    function triggerAction() {
        if (!musicStarted) {
            bgm.play().catch(err => console.log("BGM 播放受阻"));
            musicStarted = true;
        }
        const randomSfx = sfxList[Math.floor(Math.random() * sfxList.length)];
        sfx.src = `sounds/${randomSfx}.mp3`;
        sfx.play();
    }

    // --- YouTube 背景 ---
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    var player;
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            videoId: 'YgPAAgtHCts',
            playerVars: { 'autoplay': 1, 'mute': 1, 'loop': 1, 'playlist': 'YgPAAgtHCts', 'controls': 0, 'modestbranding': 1, 'playsinline': 1 },
            events: { 'onReady': (e) => e.target.playVideo() }
        });
    }

    // --- 核心變數 ---
    let originalStudents = [{name:"陳凱晴"}, {name:"陳家俊"}, {name:"陳柏希"}, {name:"陳子淇"}, {name:"趙子博"}, {name:"何宛盈"}, {name:"黃子淇"}, {name:"許家佑"}, {name:"熊可堯"}, {name:"高培釗"}, {name:"郭衍銳"}, {name:"郭宥瑜"}, {name:"鄺皓然"}, {name:"劉頌彥"}, {name:"劉凱維"}, {name:"劉逸朗"}, {name:"李柏廷"}, {name:"梁欣媛"}, {name:"梁汝謙"}, {name:"李嘉軒"}, {name:"歐陽可晴"}, {name:"彭洛賢"}, {name:"彭泳沁"}, {name:"沈梓僖"}, {name:"蘇靖楠"}, {name:"王翠彤"}, {name:"黃嘉璇"}, {name:"黃　森"}, {name:"謝雨桐"}, {name:"楊凱喬"}, {name:"楊茵晴"}, {name:"葉曦臨"}];
    
    let chanceItems = ["下一位抽到的同學，可在今堂隨意移動座位", "下一位抽到的同學，可重抽一次", "下一位抽到的同學，可點播一首歌"];
    let fateItems = ["下一位抽到的同學，需使用英文作答", "下一位抽到的同學，需邊跳舞邊回答", "下一位抽到的同學，需模仿帶貨直播主的語氣回答", "下一位抽到的同學，需用唱歌的方式把答案唱出來"];
    
    let mapData = [];
    let boardW = 0, boardH = 0, currentIndex = 0, isAnimating = false;
    let nextMustBeStudent = false; 

    const blacklist = ["楊凱喬", "楊茵晴"]; 

    function initBoard() {
        let stuPool = originalStudents.map((s, i) => ({
            type: 'student',
            name: s.name,
            // 2. 學生頭像改為貓貓動圖 (GIF)
            avatar: `https://cataas.com/cat/gif?unique=${i}_${Math.random()}`
        }));

        let totalNeeded = stuPool.length + 12; 
        let sumWH = (totalNeeded + 4) / 2;
        boardW = Math.ceil(sumWH * 0.6); 
        boardH = Math.floor(sumWH - boardW);
        let perimeter = 2 * (boardW + boardH) - 4;

        let specialCount = perimeter - stuPool.length;
        let specialPool = [];
        for (let i = 0; i < specialCount; i++) {
            if (i % 2 === 0) {
                specialPool.push({ type: 'chance', text: '❓<br>機會' });
            } else {
                specialPool.push({ type: 'fate', text: '❗<br>命運' });
            }
        }

        mapData = [...stuPool, ...specialPool].sort(() => Math.random() - 0.5);
        renderBoard();
    }

    function renderBoard() {
        const board = document.getElementById('board-container');
        board.style.gridTemplateColumns = `repeat(${boardW}, 1fr)`;
        board.style.gridTemplateRows = `repeat(${boardH}, 1fr)`;
        
        document.querySelectorAll('.cell').forEach(c => c.remove());
        mapData.forEach((data, i) => {
            const cell = document.createElement('div');
            cell.id = `cell-${i}`;
            cell.className = `cell ${data.type}`;
            cell.innerHTML = data.type === 'student' ? `<img src="${data.avatar}" class="cat-avatar"><div class="cell-text">${data.name}</div>` : `<div class="cell-text">${data.text}</div>`;
            const pos = getGridPos(i);
            cell.style.gridRow = pos.r; cell.style.gridColumn = pos.c;
            board.appendChild(cell);
        });
        updateActive();
    }

    function getGridPos(i) {
        if (i < boardW) return { r: 1, c: i + 1 };
        if (i < boardW + boardH - 1) return { r: i - boardW + 2, c: boardW };
        if (i < 2 * boardW + boardH - 2) return { r: boardH, c: boardW - (i - (boardW + boardH - 2)) };
        return { r: boardH - (i - (2 * boardW + boardH - 3)), c: 1 };
    }

    function updateActive() {
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
        document.getElementById(`cell-${currentIndex}`)?.classList.add('active');
    }

    function calculateValidSteps(requestedSteps) {
        let targetIdx = (currentIndex + requestedSteps) % mapData.length;
        while (true) {
            const target = mapData[targetIdx];
            if (nextMustBeStudent && target.type !== 'student') {
                requestedSteps++;
                targetIdx = (currentIndex + requestedSteps) % mapData.length;
                continue;
            }
            if (target.type === 'student' && blacklist.includes(target.name)) {
                requestedSteps++;
                targetIdx = (currentIndex + requestedSteps) % mapData.length;
                continue;
            }
            break;
        }
        return requestedSteps;
    }

    function rollDice() {
        if (isAnimating) return;
        triggerAction();
        isAnimating = true;
        let s1 = Math.floor(Math.random() * 6) + 1;
        let s2 = Math.floor(Math.random() * 6) + 1;
        document.getElementById('dice1').innerText = s1;
        document.getElementById('dice2').innerText = s2;
        let total = calculateValidSteps(s1 + s2);
        moveSteps(total);
    }

    function startMarquee() {
        if (isAnimating) return;
        triggerAction();
        isAnimating = true;
        let base = mapData.length + Math.floor(Math.random() * mapData.length);
        let total = calculateValidSteps(base);
        moveSteps(total, true);
    }

    function moveSteps(s, fast=false) {
        if (s <= 0) { isAnimating = false; land(); return; }
        currentIndex = (currentIndex + 1) % mapData.length;
        updateActive();
        setTimeout(() => moveSteps(s - 1, fast), fast ? 60 : 200);
    }

    function land() {
        const data = mapData[currentIndex];
        const modal = document.getElementById('result-modal');
        const title = document.getElementById('result-title');
        const display = document.getElementById('result-display');
        modal.style.display = 'flex';
        
        if (data.type === 'student') {
            nextMustBeStudent = false;
            title.innerText = "🎉 恭喜幸運兒";
            display.innerHTML = `
                <img src="${data.avatar}" style="width:150px; height:150px; border-radius:15px; border:4px solid #000; margin-bottom:10px; object-fit:cover;">
                <div style="font-size:40px; font-weight:bold; color:var(--monopoly-blue);">${data.name}</div>
            `; 
            confetti({ zIndex: 3000 });
        } else {
            nextMustBeStudent = true;
            let pool = data.type === 'chance' ? chanceItems : fateItems;
            let randomText = pool[Math.floor(Math.random() * pool.length)];
            title.innerText = data.type === 'chance' ? "❓ 機會時刻" : "❗ 命運降臨";
            display.innerHTML = `<div style="font-size:24px; font-weight:bold; padding:20px; line-height:1.4;">${randomText}<br><small style="color:red;">(下一抽必中人名！)</small></div>`;
        }
    }

    function closeResult() { 
        triggerAction();
        document.getElementById('result-modal').style.display = 'none'; 
    }

    function toggleModal(s) { 
        triggerAction();
        if(s) {
            document.getElementById('input-students').value = originalStudents.map(s => s.name).join('\n');
            document.getElementById('input-chance').value = chanceItems.join('\n');
            document.getElementById('input-fate').value = fateItems.join('\n');
        }
        document.getElementById('settings-modal').style.display = s ? 'flex' : 'none'; 
    }

    function applySettings() {
        triggerAction();
        const studentsIn = document.getElementById('input-students').value;
        originalStudents = studentsIn.split('\n').filter(n => n.trim() !== "").map(n => ({name: n.trim()}));
        chanceItems = document.getElementById('input-chance').value.split('\n').filter(t => t.trim() !== "");
        fateItems = document.getElementById('input-fate').value.split('\n').filter(t => t.trim() !== "");
        initBoard();
        toggleModal(false);
    }

    initBoard();
</script>
</body>
</html>
