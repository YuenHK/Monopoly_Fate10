<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大富翁抽籤系統 - 貓貓版</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --center-bg: rgba(255, 255, 255, 0.1); /* 10% 透明 */
            --border-color: #111;
            --monopoly-red: #e63946;
            --monopoly-blue: #0072bb;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background: #000; /* 影片載入前的底色 */
        }

        /* 影片置底層 */
        .video-background {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .video-background iframe {
            position: absolute;
            top: 50%; left: 50%;
            width: 100vw; height: 100vh;
            transform: translate(-50%, -50%);
        }

        /* 遊戲外框 */
        #board-container {
            width: 90vw;
            height: 85vh; 
            max-width: 1100px;
            max-height: 800px;
            display: grid;
            gap: 2px;
            /* 必須是 transparent 才能看到後方的影片 */
            background: transparent !important; 
            border: 4px solid var(--border-color);
            position: relative;
            z-index: 1;
        }

        /* 格子樣式 */
        .cell {
            background: rgba(255, 255, 255, 0.85); /* 格子保留一點白色以便閱讀 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            outline: 1px solid var(--border-color);
        }

        /* 中間穿透區域 */
        #center-area { 
            grid-column: 2 / -2;
            grid-row: 2 / -2;
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            margin: 5px;
            border: 2px solid var(--border-color);
            /* 實現 10% 透明穿透 */
            background: var(--center-bg); 
            /* 可選：增加一點毛玻璃效果讓文字更清楚，如不需要可刪除下一行 */
            backdrop-filter: blur(2px); 
        }

        .logo-text { 
            background: var(--monopoly-red); color: #fff; 
            padding: 8px 20px; font-size: clamp(18px, 4vmin, 32px);
            transform: rotate(-2deg); border: 3px solid #000; 
            box-shadow: 4px 4px 0px #000; margin-bottom: 15px; 
        }

        #status-text { 
            background: rgba(255,255,255,0.7); 
            padding: 5px 15px; border-radius: 20px;
            font-weight: bold; margin-bottom: 10px;
        }

        /* 其他元件保持不變... */
        .cat-avatar { width: 3.5vmin; height: 3.5vmin; min-width: 25px; border-radius: 50%; margin-bottom: 5px; }
        .cell-text { font-size: clamp(10px, 1.8vmin, 20px); }
        .cell.active { border: 4px solid var(--monopoly-red); background: #fff !important; z-index: 10; outline: none; transform: scale(1.05); }
        .dice-container { display: flex; gap: 8px; margin-bottom: 8px; }
        .dice { width: 45px; height: 45px; background: white; border: 2px solid #000; display: flex; justify-content: center; align-items: center; font-size: 24px; border-radius: 6px; }
        button { cursor: pointer; padding: 10px 20px; font-weight: bold; border: 2px solid #000; box-shadow: 2px 2px 0px #000; border-radius: 5px; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #fff; padding: 20px; border-radius: 10px; width: 80%; max-width: 500px; }
        #result-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 2000; justify-content: center; align-items: center; }
        .result-box { background: #fff; padding: 30px; border: 5px solid #000; text-align: center; }
    </style>
</head>
<body>

<div class="video-background">
    <div id="player"></div>
</div>

<div id="settings-modal" class="modal-overlay">
    <div class="modal-content">
        <h3>⚙️ 設定</h3>
        <textarea id="input-students" style="width:100%; height:100px;"></textarea>
        <div style="margin-top:10px;">
            <button onclick="applySettings()">儲存</button>
            <button onclick="toggleModal(false)">關閉</button>
        </div>
    </div>
</div>

<div id="result-modal">
    <div class="result-box">
        <h2 id="result-title"></h2>
        <div id="result-display"></div>
        <button onclick="closeResult()" style="margin-top:20px;">確定</button>
    </div>
</div>

<div id="board-container">
    <div id="center-area">
        <div class="logo-text">大富翁抽籤系統</div>
        <div id="status-text">準備好了嗎？</div>
        <div class="dice-container">
            <div class="dice" id="dice1">?</div>
            <div class="dice" id="dice2">?</div>
        </div>
        <div style="display:flex; gap:10px;">
            <button onclick="rollDice()" style="background:var(--monopoly-red); color:#fff;">🎲 擲骰子</button>
            <button onclick="startMarquee()" style="background:#ffb703;">⚡ 快速抽籤</button>
        </div>
        <button onclick="toggleModal(true)" style="margin-top:10px; font-size:12px;">⚙️ 設定</button>
    </div>
</div>

<script>
    // YouTube API
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    var player;
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            videoId: 'YgPAAgtHCts',
            playerVars: { 'autoplay': 1, 'mute': 1, 'loop': 1, 'playlist': 'YgPAAgtHCts', 'controls': 0, 'modestbranding': 1, 'playsinline': 1 },
            events: { 'onReady': (e) => e.target.playVideo() }
        });
    }

    // 邏輯部分 (名單略，保持您原本的邏輯)
    let originalStudents = [{id:"1", name:"陳凱晴"}, {id:"2", name:"陳家俊"}, {id:"3", name:"陳柏希"}, {id:"4", name:"陳子淇"}, {id:"5", name:"趙子博"}, {id:"6", name:"何宛盈"}, {id:"7", name:"黃子淇"}, {id:"8", name:"許家佑"}, {id:"9", name:"熊可堯"}, {id:"10", name:"高培釗"}, {id:"11", name:"郭衍銳"}, {id:"12", name:"郭宥瑜"}, {id:"13", name:"鄺皓然"}, {id:"14", name:"劉頌彥"}, {id:"15", name:"劉凱維"}, {id:"16", name:"劉逸朗"}, {id:"17", name:"李柏廷"}, {id:"18", name:"梁欣媛"}, {id:"19", name:"梁汝謙"}, {id:"20", name:"李嘉軒"}, {id:"21", name:"歐陽可晴"}, {id:"22", name:"彭洛賢"}, {id:"23", name:"彭泳沁"}, {id:"24", name:"沈梓僖"}, {id:"25", name:"蘇靖楠"}, {id:"26", name:"王翠彤"}, {id:"27", name:"黃嘉璇"}, {id:"28", name:"黃　森"}, {id:"29", name:"謝雨桐"}, {id:"30", name:"楊凱喬"}, {id:"31", name:"楊茵晴"}, {id:"32", name:"葉曦臨"}];
    let mapData = [];
    let boardW = 0, boardH = 0, currentIndex = 0, isAnimating = false;

    function initBoard() {
        let tempStudents = [...originalStudents].sort(() => Math.random() - 0.5);
        let total = tempStudents.length + 12; // 預留空間給機會命運
        let sumWH = (total + 4) / 2;
        boardW = Math.ceil(sumWH * 0.6); boardH = Math.floor(sumWH - boardW);
        let perimeter = 2 * (boardW + boardH) - 4;
        
        mapData = new Array(perimeter).fill(null).map((_, i) => {
            if (i < tempStudents.length) return { type: 'student', name: tempStudents[i].name, avatar: `https://cataas.com/cat/cute?width=50&unique=${i}` };
            return { type: 'chance', text: '❓<br>機會' };
        }).sort(() => Math.random() - 0.5);

        renderBoard();
    }

    function renderBoard() {
        const board = document.getElementById('board-container');
        board.style.gridTemplateColumns = `repeat(${boardW}, 1fr)`;
        board.style.gridTemplateRows = `repeat(${boardH}, 1fr)`;
        
        document.querySelectorAll('.cell').forEach(c => c.remove());
        mapData.forEach((data, i) => {
            const cell = document.createElement('div');
            cell.id = `cell-${i}`;
            cell.className = `cell`;
            cell.innerHTML = data.type === 'student' ? `<img src="${data.avatar}" class="cat-avatar"><div class="cell-text">${data.name}</div>` : `<div class="cell-text">${data.text}</div>`;
            const pos = getGridPos(i);
            cell.style.gridRow = pos.r; cell.style.gridColumn = pos.c;
            board.appendChild(cell);
        });
        updateActive();
    }

    function getGridPos(i) {
        if (i < boardW) return { r: 1, c: i + 1 };
        if (i < boardW + boardH - 1) return { r: i - boardW + 2, c: boardW };
        if (i < 2 * boardW + boardH - 2) return { r: boardH, c: boardW - (i - (boardW + boardH - 2)) };
        return { r: boardH - (i - (2 * boardW + boardH - 3)), c: 1 };
    }

    function updateActive() {
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
        document.getElementById(`cell-${currentIndex}`)?.classList.add('active');
    }

    function rollDice() {
        if (isAnimating) return;
        isAnimating = true;
        let s = Math.floor(Math.random() * 12) + 1;
        moveSteps(s);
    }

    function startMarquee() {
        if (isAnimating) return;
        isAnimating = true;
        moveSteps(mapData.length + Math.floor(Math.random()*10), true);
    }

    function moveSteps(s, fast=false) {
        if (s <= 0) { isAnimating = false; land(); return; }
        currentIndex = (currentIndex + 1) % mapData.length;
        updateActive();
        setTimeout(() => moveSteps(s - 1, fast), fast ? 50 : 200);
    }

    function land() {
        const data = mapData[currentIndex];
        document.getElementById('result-modal').style.display = 'flex';
        document.getElementById('result-title').innerText = "中獎者";
        document.getElementById('result-display').innerText = data.name || "機會";
        if (data.type === 'student') confetti();
    }

    function closeResult() { document.getElementById('result-modal').style.display = 'none'; }
    function toggleModal(s) { document.getElementById('settings-modal').style.display = s ? 'flex' : 'none'; }

    initBoard();
</script>
</body>
</html>
