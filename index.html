<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大富翁抽籤系統 - 貓教主背景版</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --board-bg: rgba(205, 230, 208, 0.7); /* 加入透明度，讓背景影片隱約透出 */
            --center-bg: rgba(251, 248, 239, 0.9);
            --border-color: #111;
            --monopoly-red: #e63946;
            --monopoly-blue: #0072bb;
            --monopoly-green: #1fb25a;
            --monopoly-purple: #8b5cf6;
            --monopoly-yellow: #ffb703;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
            background: #000; /* 影片載入前的底色 */
        }

        /* 背景影片容器 */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* 放在最底層 */
            pointer-events: none; /* 防止點擊到影片 */
            overflow: hidden;
        }

        .video-background iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 100vh;
            transform: translate(-50%, -50%);
        }

        /* 為了配合手機直向影片，我們使用 object-fit 覆蓋感 */
        @media (min-aspect-ratio: 16/9) {
            .video-background iframe { height: 300%; width: 100%; }
        }
        @media (max-aspect-ratio: 16/9) {
            .video-background iframe { width: 300%; height: 100%; }
        }

        #board-container {
            position: relative;
            width: 95vw;
            height: 53.4vw;
            max-width: 1200px;
            max-height: 675px;
            display: grid;
            gap: 2px;
            background: var(--border-color);
            border: 4px solid var(--border-color);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            /* z-index 確保在影片之上 */
            z-index: 1;
        }

        /* 微調格子透明度，增加視覺層次感 */
        .cell {
            background: rgba(255, 255, 255, 0.85);
            position: relative;
            display: flex;
            flex-direction: column;
            text-align: center;
            font-weight: bold;
            transition: all 0.1s;
            overflow: hidden;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        /* ... 其餘 CSS 保持不變 ... */
        .cell-text { padding: 5px; font-size: clamp(8px, 2.5vmin, 32px); color: #111; word-break: break-word; line-height: 1.2; font-weight: bold; }
        .cell.chance { background: rgba(255, 235, 204, 0.9); }
        .cell.fate { background: rgba(255, 230, 230, 0.9); }
        .cell.active { border: 4px solid var(--monopoly-red); box-shadow: inset 0 0 12px var(--monopoly-red); transform: scale(1.05); z-index: 15 !important; background: #fff !important; }
        #center-area { display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--center-bg); border: 2px solid var(--border-color); margin: 5px; padding: 10px; position: relative; z-index: 1; }
        .logo-text { background: var(--monopoly-red); color: #fff; padding: 8px 20px; font-size: clamp(16px, 4vmin, 36px); transform: rotate(-2deg); border: 3px solid #000; box-shadow: 4px 4px 0px #000; margin-bottom: 10px; font-weight: bold; }
        #status-text { font-size: clamp(12px, 2.2vmin, 20px); margin-bottom: 5px; font-weight: bold; min-height: 25px; }
        .dice-container { display: flex; gap: 10px; margin-bottom: 10px; }
        .dice { width: 50px; height: 50px; background: white; border: 3px solid #000; display: flex; justify-content: center; align-items: center; font-size: 28px; font-weight: bold; box-shadow: 3px 3px 0px #000; border-radius: 8px; color: var(--monopoly-red); }
        .btn-group { display: flex; gap: 8px; margin-bottom: 10px; }
        button { cursor: pointer; padding: 8px 15px; font-weight: bold; border: 2px solid #000; border-radius: 6px; box-shadow: 3px 3px 0px #000; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #fff; width: 90%; max-width: 600px; padding: 20px; border-radius: 10px; border: 4px solid #000; max-height: 80vh; overflow-y: auto; }
        textarea { width: 100%; height: 80px; margin: 10px 0; border: 2px solid #000; padding: 8px; box-sizing: border-box; font-size: 14px; }
        #result-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .result-box { background: #fff; padding: 30px; border-radius: 15px; border: 5px solid #000; text-align: center; max-width: 400px; box-shadow: 10px 10px 0px #000; }
        .result-name { font-size: clamp(36px, 7vmin, 60px); color: var(--monopoly-blue); margin: 20px 0; font-weight: bold; }
        .result-text { font-size: 24px; padding: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="video-background">
    <div id="player"></div>
</div>

<div id="settings-modal" class="modal-overlay">
    <div class="modal-content">
        <h2>⚙️ 系統設定</h2>
        <label><b>1. 名單 (學號,姓名)</b></label>
        <textarea id="input-students"></textarea>
        <label><b>2. 自訂【機會】</b></label>
        <textarea id="input-chance"></textarea>
        <label><b>3. 自訂【命運】</b></label>
        <textarea id="input-fate"></textarea>
        <div style="text-align: right; margin-top: 10px;">
            <button onclick="toggleModal(false)">取消</button>
            <button onclick="applySettings()" style="background: var(--monopoly-blue); color: #fff;">儲存設定</button>
        </div>
    </div>
</div>

<div id="result-modal">
    <div class="result-box">
        <h2 id="result-title">標題</h2>
        <div id="result-display"></div>
        <button onclick="closeResult()" style="background: var(--monopoly-red); color: white; padding: 10px 30px;">確定</button>
    </div>
</div>

<div id="board-container">
    <div id="center-area">
        <div class="logo-text">大富翁抽籤系統 貓教主版🐾</div>
        <div id="status-text">準備好了嗎？</div>
        <div class="dice-container">
            <div class="dice" id="dice1">?</div>
            <div class="dice" id="dice2">?</div>
        </div>
        <div class="btn-group">
            <button id="btn-roll" onclick="rollDice()" style="background: var(--monopoly-red); color: white;">🎲 擲骰子</button>
            <button id="btn-marquee" onclick="startMarquee()" style="background: var(--monopoly-yellow);">⚡ 快速抽籤</button>
        </div>
        <button id="btn-settings" onclick="toggleModal(true)">⚙️ 設定</button>
    </div>
</div>

<script>
    // YouTube Player API 
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    var player;
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            videoId: 'YgPAAgtHCts',
            playerVars: {
                'autoplay': 1,      // 自動播放
                'mute': 1,          // 必須靜音，否則會被瀏覽器封鎖
                'loop': 1,          // 循環播放
                'playlist': 'YgPAAgtHCts', // 循環必備：必須重複影片 ID
                'controls': 0,      // 隱藏控制項
                'showinfo': 0,
                'modestbranding': 1,
                'playsinline': 1,   // 在行動裝置上內嵌播放，不彈出全螢幕
                'rel': 0
            },
            events: {
                'onReady': onPlayerReady,
                'onStateChange': function(e) {
                    // 萬一影片停止（例如循環失效），強制重啟
                    if (e.data === YT.PlayerState.ENDED) {
                        player.playVideo();
                    }
                }
            }
        });
    }

    function onPlayerReady(event) {
        event.target.mute(); // 確保靜音，這是繞過「黑色畫面」的關鍵
        event.target.playVideo();
    }

    // --- 以下為原本的大富翁邏輯 ---
    let originalStudents = [
        {id: "1", name: "陳凱晴"}, {id: "2", name: "陳家俊"}, {id: "3", name: "陳柏希"},
        {id: "4", name: "陳子淇"}, {id: "5", name: "趙子博"}, {id: "6", name: "何宛盈"},
        {id: "7", name: "黃子淇"}, {id: "8", name: "許家佑"}, {id: "9", name: "熊可堯"},
        {id: "10", name: "高培釗"}, {id: "11", name: "郭衍銳"}, {id: "12", name: "郭宥瑜"},
        {id: "13", name: "鄺皓然"}, {id: "14", name: "劉頌彥"}, {id: "15", name: "劉凱維"},
        {id: "16", name: "劉逸朗"}, {id: "17", name: "李柏廷"}, {id: "18", name: "梁欣媛"},
        {id: "19", name: "梁汝謙"}, {id: "20", name: "李嘉軒"}, {id: "21", name: "歐陽可晴"},
        {id: "22", name: "彭洛賢"}, {id: "23", name: "彭泳沁"}, {id: "24", name: "沈梓僖"},
        {id: "25", name: "蘇靖楠"}, {id: "26", name: "王翠彤"}, {id: "27", name: "黃嘉璇"},
        {id: "28", name: "黃　森"}, {id: "29", name: "謝雨桐"}, {id: "30", name: "楊凱喬"},
        {id: "31", name: "楊茵晴"}, {id: "32", name: "葉曦臨"}
    ];
    let chanceList = ["下一位抽到的同學，可在今堂隨意移動座位", "下一位抽到的同學，可重抽一次", "下一位抽到的同學，可在Youtube點播一首歌"];
    let fateList = ["下一位抽到的同學，需使用英文作答", "下一位抽到的同學，需邊跳舞邊回答", "下一位抽到的同學，需模仿直播主回答", "下一位抽到的同學，需唱出答案", "下一位抽到的同學，需對鄰座深情解釋"];

    let mapData = [];
    let boardW = 0, boardH = 0;
    let currentIndex = 0;
    let isAnimating = false;
    let consecutiveSpecialCount = 0;

    function toggleModal(show) {
        if(show) {
            document.getElementById('input-students').value = originalStudents.map(s => `${s.id},${s.name}`).join('\n');
            document.getElementById('input-chance').value = chanceList.join('\n');
            document.getElementById('input-fate').value = fateList.join('\n');
        }
        document.getElementById('settings-modal').style.display = show ? 'flex' : 'none';
    }

    function applySettings() {
        const rawStu = document.getElementById('input-students').value.trim().split('\n');
        originalStudents = rawStu.map(line => {
            if(line.trim() === '') return null;
            const p = line.split(',');
            return { id: p[0].trim(), name: (p[1] || p[0]).trim() };
        }).filter(s => s !== null);
        chanceList = document.getElementById('input-chance').value.split('\n').filter(l => l.trim());
        fateList = document.getElementById('input-fate').value.split('\n').filter(l => l.trim());
        currentIndex = 0;
        initBoard();
        toggleModal(false);
    }

    function initBoard() {
        const countChance = 10;
        const countFate = 10;
        let stuPool = [];
        let tempStudents = [...originalStudents];
        tempStudents.sort(() => Math.random() - 0.5);
        const colors = ['#fdf6e3', '#e0f7fa', '#fce4ec', '#fff3e0', '#e8f5e9', '#fff9c4'];
        tempStudents.forEach((s, idx) => {
            stuPool.push({ type: 'student', name: s.name, id: s.id, color: colors[idx % colors.length] });
        });
        let specialPool = [];
        for(let i=0; i<countChance; i++) specialPool.push({ type: 'chance', text: '❓<br>機會' });
        for(let i=0; i<countFate; i++) specialPool.push({ type: 'fate', text: '❗<br>命運' });
        specialPool.sort(() => Math.random() - 0.5);
        const total = stuPool.length + specialPool.length;
        const sumWH = (total + 4) / 2;
        boardW = Math.ceil(sumWH * 0.62); 
        boardH = Math.floor(sumWH - boardW);
        if (boardH < 3) { boardH = 3; boardW = sumWH - 3; }
        const perimeter = 2 * (boardW + boardH) - 4;
        let diff = perimeter - stuPool.length;
        if (diff > specialPool.length) {
            while (specialPool.length < diff) specialPool.push({ type: 'fate', text: '❗<br>命運' });
        } else if (diff < specialPool.length) {
            specialPool = specialPool.slice(0, diff);
        }
        mapData = new Array(perimeter).fill(null);
        let numStu = stuPool.length;
        for (let i = 0; i < numStu; i++) {
            let targetIdx = Math.floor((i * perimeter) / numStu);
            while(mapData[targetIdx] !== null) { targetIdx = (targetIdx + 1) % perimeter; }
            mapData[targetIdx] = stuPool[i];
        }
        for (let i = 0; i < perimeter; i++) { if (mapData[i] === null) { mapData[i] = specialPool.pop(); } }
        renderBoard();
    }

    function getGridPos(i) {
        if (i < boardW) return { r: 1, c: i + 1 }; 
        if (i < boardW + boardH - 1) return { r: i - boardW + 2, c: boardW }; 
        if (i < 2 * boardW + boardH - 2) return { r: boardH, c: boardW - (i - (boardW + boardH - 2)) }; 
        return { r: boardH - (i - (2 * boardW + boardH - 3)), c: 1 }; 
    }

    function renderBoard() {
        const board = document.getElementById('board-container');
        board.style.gridTemplateColumns = `repeat(${boardW}, 1fr)`;
        board.style.gridTemplateRows = `repeat(${boardH}, 1fr)`;
        document.querySelectorAll('.cell').forEach(c => c.remove());
        mapData.forEach((data, i) => {
            const cell = document.createElement('div');
            cell.id = `cell-${i}`;
            cell.className = `cell ${data.type}`;
            if(data.type === 'student') cell.style.backgroundColor = data.color;
            cell.innerHTML = `<div class="cell-text">${data.name || data.text}</div>`;
            const pos = getGridPos(i);
            cell.style.gridRow = pos.r;
            cell.style.gridColumn = pos.c;
            board.appendChild(cell);
        });
        const center = document.getElementById('center-area');
        center.style.gridColumn = `2 / ${boardW}`;
        center.style.gridRow = `2 / ${boardH}`;
        updateActive();
    }

    function updateActive() {
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
        const el = document.getElementById(`cell-${currentIndex}`);
        if(el) el.classList.add('active');
    }

    function setControlsEnabled(enabled) {
        ['btn-roll', 'btn-marquee', 'btn-settings'].forEach(id => {
            const btn = document.getElementById(id);
            if(btn) btn.disabled = !enabled;
        });
    }

    function rollDice() {
        if(isAnimating) return;
        isAnimating = true;
        setControlsEnabled(false);
        closeResult();
        let s1 = Math.floor(Math.random() * 6) + 1;
        let s2 = Math.floor(Math.random() * 6) + 1;
        let count = 0;
        let timer = setInterval(() => {
            document.getElementById('dice1').innerText = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dice2').innerText = Math.floor(Math.random() * 6) + 1;
            if(count++ > 10) {
                clearInterval(timer);
                document.getElementById('dice1').innerText = s1;
                document.getElementById('dice2').innerText = s2;
                moveSteps(s1 + s2);
            }
        }, 50);
    }

    function startMarquee() {
        if(isAnimating) return;
        isAnimating = true;
        setControlsEnabled(false);
        closeResult();
        let studentIndices = [];
        mapData.forEach((cell, idx) => { if (cell.type === 'student') studentIndices.push(idx); });
        let targetIdx = studentIndices[Math.floor(Math.random() * studentIndices.length)];
        let minSteps = mapData.length * 2; 
        let stepsToTarget = (targetIdx - currentIndex + mapData.length) % mapData.length;
        moveSteps(minSteps + stepsToTarget, true);
    }

    function moveSteps(steps, fast=false) {
        if(steps <= 0) { land(); return; }
        currentIndex = (currentIndex + 1) % mapData.length;
        updateActive();
        let delay = fast ? 40 : 150;
        if (fast && steps < 5) delay = 40 + (5 - steps) * 40; 
        setTimeout(() => moveSteps(steps - 1, fast), delay);
    }

    function land() {
        const data = mapData[currentIndex];
        const modal = document.getElementById('result-modal');
        const title = document.getElementById('result-title');
        const display = document.getElementById('result-display');
        modal.style.display = 'flex';
        if(data.type === 'student') {
            title.innerText = "🎉 恭喜幸運兒";
            display.innerHTML = `<div class="result-name">${data.name}</div>`;
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, zIndex: 3000 });
        } else {
            const list = data.type === 'chance' ? chanceList : fateList;
            const res = list[Math.floor(Math.random()*list.length)];
            title.innerText = data.type === 'chance' ? "🎁 機會時刻" : "⚡ 命運降臨";
            display.innerHTML = `<div class="result-text">${res}</div>`;
        }
    }

    function closeResult() {
        document.getElementById('result-modal').style.display = 'none';
        isAnimating = false;
        setControlsEnabled(true);
    }

    initBoard();
</script>
</body>
</html>
